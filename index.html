<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca Pessoal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>📚 Biblioteca Pessoal</h1>
    <nav>
      <ul>
        <li><a href="#catalogo">Catálogo</a></li>
        <li><a href="#cadastro">Cadastrar</a></li>
        <li><a href="#favoritos">Favoritos</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section id="cadastro">
      <h2>Cadastrar Livro</h2>
      <form id="form-livro">
        <div class="campo">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" placeholder="Título do livro" required>
        </div>
        <div class="campo">
          <label for="autor">Autor</label>
          <input type="text" id="autor" placeholder="Nome do autor" required>
        </div>
        <div class="campo">
          <label for="genero">Gênero</label>
          <select id="genero" required>
            <option value="">Selecione...</option>
            <option value="Ficção">Ficção</option>
            <option value="Romance">Romance</option>
            <option value="Terror">Terror</option>
            <option value="Fantasia">Fantasia</option>
            <option value="Biografia">Biografia</option>
            <option value="Ciência">Ciência</option>
            <option value="Tecnologia">Tecnologia</option>
            <option value="Outros">Outros</option>
          </select>
        </div>
        <div class="campo">
          <label for="ano">Ano</label>
          <input type="number" id="ano" placeholder="Ex: 2023" min="1000" max="2099">
        </div>
        <div class="campo campo-checkbox">
          <label>
            <input type="checkbox" id="favorito"> Marcar como favorito
          </label>
        </div>
        <button type="submit" class="btn-primary">Adicionar Livro</button>
      </form>
    </section>

    <section id="catalogo">
      <div class="catalogo-header">
        <h2>Catálogo de Livros</h2>
        <div class="resumo">
          <span id="total-livros">Total: 0 livros</span>
          <span id="total-favoritos">⭐ 0 favoritos</span>
        </div>
      </div>

      <div class="filtros">
        <input type="text" id="pesquisa" placeholder="🔍 Pesquisar por título ou autor...">
        <select id="filtro-genero">
          <option value="">Todos os gêneros</option>
          <option value="Ficção">Ficção</option>
          <option value="Romance">Romance</option>
          <option value="Terror">Terror</option>
          <option value="Fantasia">Fantasia</option>
          <option value="Biografia">Biografia</option>
          <option value="Ciência">Ciência</option>
          <option value="Tecnologia">Tecnologia</option>
          <option value="Outros">Outros</option>
        </select>
        <select id="filtro-favorito">
          <option value="">Todos</option>
          <option value="sim">Apenas favoritos</option>
          <option value="nao">Sem favoritos</option>
        </select>
      </div>

      <ul id="lista-livros">
        <li class="vazio">Nenhum livro cadastrado ainda.</li>
      </ul>
    </section>

  </main>

  <aside id="favoritos">
    <h2>⭐ Favoritos</h2>
    <ul id="lista-favoritos">
      <li class="vazio">Nenhum favorito ainda.</li>
    </ul>
  </aside>

  <footer>
    <p>Biblioteca Pessoal &copy; 2025 — Feito com HTML, CSS e JavaScript</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>

</html></html>
